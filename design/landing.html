-spacing:-.02em;font-weight:700}\n  .sec-head p{margin-top:12px;color:var(--text-2);font-size:16px}\n\n  /* features */\n  .feat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--divider);border:1px solid var(--divider);border-radius:14px;overflow:hidden}\n  .feat{background:var(--surface);padding:22px 20px 24px;display:flex;flex-direction:column;gap:12px}\n  .feat .fi{width:34px;height:34px;border-radius:9px;background:var(--accent-tint);color:var(--accent);display:flex;align-items:center;justify-content:center}\n  .feat h3{font-size:14.5px;font-weight:600;letter-spacing:-.01em}\n  .feat p{font-size:13px;color:var(--text-2);line-height:1.5}\n\n  /* install note */\n  .note{background:var(--surface);border:1px solid var(--divider);border-radius:14px;box-shadow:var(--shadow);padding:26px 28px;display:flex;gap:20px;align-items:flex-start}\n  .note .ni{width:40px;height:40px;border-radius:10px;background:var(--surface-2);color:var(--text-2);display:flex;align-items:center;justify-content:center;flex:none}\n  .note h3{font-size:16px;font-weight:600;margin-bottom:8px}\n  .note p{font-size:14px;color:var(--text-2);line-height:1.6}\n  .note code{font-family:ui-monospace,'Cascadia Code',monospace;font-size:12.5px;background:var(--surface-2);padding:1px 6px;border-radius:4px;color:var(--text)}\n\n  /* footer */\n  footer{border-top:1px solid var(--divider);padding:34px 0 46px;margin-top:20px}\n  .foot-in{display:flex;align-items:center;gap:16px;flex-wrap:wrap}\n  .foot-in .brand{font-size:15px}\n  .foot-sp{flex:1}\n  .foot-meta{font-size:12.5px;color:var(--text-3)}\n\n  @media(max-width:900px){\n    .hero-grid{grid-template-columns:1fr;gap:40px}\n    .stage{order:2}\n    .feat-grid{grid-template-columns:repeat(2,1fr)}\n  }\n  @media(max-width:560px){\n    header.hero{padding:44px 0 20px}\n    .feat-grid{grid-template-columns:1fr}\n    .note{flex-direction:column;gap:14px}\n    .nav-hide{display:none}\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n\n\n<nav>\n  <div class=\"wrap nav-in\">\n    <div class=\"brand\">\n      <span class=\"logo\">文A<\u002Fspan>Lingo\n    <\u002Fdiv>\n    <span class=\"nav-sp\"><\u002Fspan>\n    <a class=\"nav-link nav-hide\" href=\"#features\">Features<\u002Fa>\n    <a class=\"nav-link\" href=\"https://github.com/dorhay87/lingo\" target=\"_blank\" rel=\"noopener\">\n      <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"currentColor\"><path d=\"M12 2C6.5 2 2 6.6 2 12.3c0 4.5 2.9 8.3 6.8 9.7.5.1.7-.2.7-.5v-1.7c-2.8.6-3.4-1.4-3.4-1.4-.4-1.2-1.1-1.5-1.1-1.5-.9-.6.1-.6.1-.6 1 .1 1.5 1 1.5 1 .9 1.6 2.4 1.1 3 .9.1-.7.3-1.1.6-1.4-2.2-.3-4.6-1.1-4.6-5 0-1.1.4-2 1-2.7-.1-.3-.4-1.3.1-2.7 0 0 .8-.3 2.7 1a9.3 9.3 0 0 1 5 0c1.9-1.3 2.7-1 2.7-1 .5 1.4.2 2.4.1 2.7.6.7 1 1.6 1 2.7 0 3.9-2.3 4.7-4.6 5 .4.3.7.9.7 1.9v2.8c0 .3.2.6.7.5 3.9-1.4 6.8-5.2 6.8-9.7C22 6.6 17.5 2 12 2z\"><\u002Fpath><\u002Fsvg>\n      GitHub\n    <\u002Fa>\n    <button class=\"icon-btn\" id=\"theme\" aria-label=\"Toggle theme\" title=\"Toggle theme\"><\u002Fbutton>\n    <a class=\"btn btn-primary btn-sm nav-hide\" href=\"https://github.com/dorhay87/lingo/releases/latest\" target=\"_blank\" rel=\"noopener\">Download<\u002Fa>\n  <\u002Fdiv>\n<\u002Fnav>\n\n<header class=\"hero\">\n  <div class=\"wrap hero-grid\">\n    <div class=\"hero-copy\">\n      <div class=\"eyebrow\">Free · Open source · Windows<\u002Fdiv>\n      <h1>A translator so small<br>it's just <span class=\"accent\">a shortcut.<\u002Fspan><\u002Fh1>\n      <p class=\"lede\">Press one key, anywhere. Lingo translates whatever you've highlighted — or whatever you type — in a popup that appears at your cursor and vanishes when you're done.<\u002Fp>\n      <div class=\"cta-row\">\n        <a class=\"btn btn-primary\" href=\"https://github.com/dorhay87/lingo/releases/latest\" target=\"_blank\" rel=\"noopener\">\n          <svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 3v13m0 0 4.5-4.5M12 16l-4.5-4.5\"><\u002Fpath><path d=\"M4 20h16\"><\u002Fpath><\u002Fsvg>\n          Download for Windows\n        <\u002Fa>\n        <a class=\"btn btn-ghost\" href=\"https://github.com/dorhay87/lingo\" target=\"_blank\" rel=\"noopener\">View source<\u002Fa>\n      <\u002Fdiv>\n      <p class=\"cta-note\"><b>Windows 10 / 11<\u002Fb> &nbsp;·&nbsp; ~3 MB installed &nbsp;·&nbsp; No account, no telemetry<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"stage\">\n      <div class=\"popup\">\n        <div class=\"pop-head\">\n          <span class=\"chip\">Auto <span class=\"muted\">· Dutch<\u002Fspan>\n            <svg width=\"9\" height=\"9\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\"><path d=\"M6 9l6 6 6-6\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n          <span class=\"pop-icn\" style=\"color:var(--text-2)\"><svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M4 8h13l-3-3M20 16H7l3 3\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n          <span class=\"chip\">English\n            <svg width=\"9\" height=\"9\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.5\"><path d=\"M6 9l6 6 6-6\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n          <span class=\"nav-sp\"><\u002Fspan>\n          <span class=\"pop-icn\"><svg width=\"15\" height=\"15\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M9 4h6l-1 5 3 3v2H7v-2l3-3-1-5z\"><\u002Fpath><line x1=\"12\" y1=\"17\" x2=\"12\" y2=\"21\"><\u002Fline><\u002Fsvg><\u002Fspan>\n        <\u002Fdiv>\n        <div class=\"div\"><\u002Fdiv>\n        <div class=\"src\">jongen<\u002Fdiv>\n        <div class=\"div\"><\u002Fdiv>\n        <div class=\"res\">boy<\u002Fdiv>\n        <div class=\"dict\">\n          <div class=\"pos\">NOUN<\u002Fdiv>\n          <div class=\"alts\">\n            <span class=\"a lead\">boy<\u002Fspan><span class=\"sep\">·<\u002Fspan>\n            <span class=\"a\">lad<\u002Fspan><span class=\"sep\">·<\u002Fspan>\n            <span class=\"a\">youngster<\u002Fspan>\n          <\u002Fdiv>\n          <div class=\"pos\">VERB<\u002Fdiv>\n          <div class=\"alts\">\n            <span class=\"a lead\">father<\u002Fspan><span class=\"sep\">·<\u002Fspan>\n            <span class=\"a\">sire<\u002Fspan>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"pop-foot\">\n          <span class=\"hint\">Tap an alternative to copy it<\u002Fspan>\n          <span class=\"copy\"><svg width=\"13\" height=\"13\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"9\" y=\"9\" width=\"11\" height=\"11\" rx=\"2\"><\u002Frect><path d=\"M5 15V5a2 2 0 0 1 2-2h10\"><\u002Fpath><\u002Fsvg>Copy <kbd>Enter<\u002Fkbd><\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"shortcut\"><kbd>Ctrl<\u002Fkbd> + <kbd>L<\u002Fkbd> from anywhere<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fheader>\n\n<section class=\"block\" id=\"features\">\n  <div class=\"wrap\">\n    <div class=\"sec-head\">\n      <h2>Everything it does, and nothing it doesn't<\u002Fh2>\n      <p>Lingo is one popup and a shortcut. No dashboard, no history to manage, no window to keep track of.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"feat-grid\">\n      <div class=\"feat\">\n        <span class=\"fi\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"2\" y=\"6\" width=\"20\" height=\"12\" rx=\"2\"><\u002Frect><path d=\"M6 10h.01M10 10h.01M14 10h.01M8 14h8\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n        <h3>One shortcut, anywhere<\u002Fh3>\n        <p>Ctrl + L opens the popup at your cursor in any app — browser, editor, chat, PDF.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"feat\">\n        <span class=\"fi\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M4 7V5a1 1 0 0 1 1-1h4\"><\u002Fpath><path d=\"M20 7V5a1 1 0 0 0-1-1h-4\"><\u002Fpath><path d=\"M4 17v2a1 1 0 0 0 1 1h4\"><\u002Fpath><path d=\"M20 17v2a1 1 0 0 1-1 1h-4\"><\u002Fpath><rect x=\"8\" y=\"9\" width=\"8\" height=\"6\" rx=\"1\" fill=\"currentColor\" stroke=\"none\" opacity=\".9\"><\u002Frect><\u002Fsvg><\u002Fspan>\n        <h3>Grabs your selection<\u002Fh3>\n        <p>Highlight text first and it's pre-filled — translation starts the instant the popup appears.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"feat\">\n        <span class=\"fi\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M4 6h16M4 12h10M4 18h6\"><\u002Fpath><path d=\"M18 15l2 2 3-3\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n        <h3>Live as you type<\u002Fh3>\n        <p>No selection? Just type. Translation updates line by line while you write.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"feat\">\n        <span class=\"fi\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M4 5a2 2 0 0 1 2-2h12v18H6a2 2 0 0 1-2-2z\"><\u002Fpath><path d=\"M8 7h7M8 11h5\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n        <h3>A dictionary for words<\u002Fh3>\n        <p>Single words get senses grouped by part of speech, with alternatives and definitions.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"feat\">\n        <span class=\"fi\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"9\"><\u002Fcircle><path d=\"M3 12h18M12 3c2.5 2.5 2.5 15 0 18M12 3c-2.5 2.5-2.5 15 0 18\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n        <h3>Detects &amp; flips scripts<\u002Fh3>\n        <p>Auto-detects the source language and lays out right-to-left scripts like Hebrew and Arabic correctly.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"feat\">\n        <span class=\"fi\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M3 12a9 9 0 0 1 9-9 9 9 0 0 1 9 9\"><\u002Fpath><rect x=\"4\" y=\"12\" width=\"16\" height=\"8\" rx=\"2\"><\u002Frect><path d=\"M9 16h6\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n        <h3>Google in, DeepL optional<\u002Fh3>\n        <p>Google works out of the box, key-free. Prefer DeepL or an LLM? Drop in your own key.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"feat\">\n        <span class=\"fi\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M9 4h6l-1 5 3 3v2H7v-2l3-3-1-5z\"><\u002Fpath><line x1=\"12\" y1=\"17\" x2=\"12\" y2=\"21\"><\u002Fline><\u002Fsvg><\u002Fspan>\n        <h3>Pin when you need it<\u002Fh3>\n        <p>Normally it closes the moment you click away. Pin it to keep it open while you work.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"feat\">\n        <span class=\"fi\"><svg width=\"18\" height=\"18\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"4\"><\u002Fcircle><path d=\"M12 2v3M12 19v3M2 12h3M19 12h3M5 5l2 2M17 17l2 2M19 5l-2 2M7 17l-2 2\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n        <h3>Light, dark &amp; accents<\u002Fh3>\n        <p>Follows your Windows theme, and you pick the accent color that fits your setup.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<section class=\"block\">\n  <div class=\"wrap\">\n    <div class=\"note\">\n      <span class=\"ni\"><svg width=\"20\" height=\"20\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 3l8 4v5c0 5-3.5 8-8 9-4.5-1-8-4-8-9V7z\"><\u002Fpath><path d=\"M9 12l2 2 4-4\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n      <div>\n        <h3>A note on installing<\u002Fh3>\n        <p>The installer isn't code-signed yet — signing certificates are expensive for a free project. Windows SmartScreen may show a blue warning the first time you run it. Click <code>More info<\u002Fcode>, then <code>Run anyway<\u002Fcode>. Everything is open source, so you can read exactly what it does <a href=\"https://github.com/dorhay87/lingo\" target=\"_blank\" rel=\"noopener\">on GitHub<\u002Fa> before you trust it.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<footer>\n  <div class=\"wrap foot-in\">\n    <div class=\"brand\"><span class=\"logo\" style=\"width:26px;height:26px;font-size:12px\">文A<\u002Fspan>Lingo<\u002Fdiv>\n    <span class=\"foot-sp\"><\u002Fspan>\n    <a class=\"nav-link\" href=\"https://github.com/dorhay87/lingo\" target=\"_blank\" rel=\"noopener\">\n      <svg width=\"16\" height=\"16\" viewBox=\"0 0 24 24\" fill=\"currentColor\"><path d=\"M12 2C6.5 2 2 6.6 2 12.3c0 4.5 2.9 8.3 6.8 9.7.5.1.7-.2.7-.5v-1.7c-2.8.6-3.4-1.4-3.4-1.4-.4-1.2-1.1-1.5-1.1-1.5-.9-.6.1-.6.1-.6 1 .1 1.5 1 1.5 1 .9 1.6 2.4 1.1 3 .9.1-.7.3-1.1.6-1.4-2.2-.3-4.6-1.1-4.6-5 0-1.1.4-2 1-2.7-.1-.3-.4-1.3.1-2.7 0 0 .8-.3 2.7 1a9.3 9.3 0 0 1 5 0c1.9-1.3 2.7-1 2.7-1 .5 1.4.2 2.4.1 2.7.6.7 1 1.6 1 2.7 0 3.9-2.3 4.7-4.6 5 .4.3.7.9.7 1.9v2.8c0 .3.2.6.7.5 3.9-1.4 6.8-5.2 6.8-9.7C22 6.6 17.5 2 12 2z\"><\u002Fpath><\u002Fsvg>\n      github.com/dorhay87/lingo\n    <\u002Fa>\n  <\u002Fdiv>\n  <div class=\"wrap\" style=\"margin-top:14px\">\n    <span class=\"foot-meta\">Free and open source · A translator so small it's just a shortcut.<\u002Fspan>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n<script>\n  (function(){\n    var root=document.documentElement, btn=document.getElementById('theme');\n    var sun='<svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"4\"/><path d=\"M12 2v2M12 20v2M2 12h2M20 12h2M5 5l1.5 1.5M17.5 17.5 19 19M19 5l-1.5 1.5M6.5 17.5 5 19\"/><\u002Fsvg>';\n    var moon='<svg width=\"17\" height=\"17\" viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.7\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8z\"/><\u002Fsvg>';\n    function apply(t){\n      root.setAttribute('data-theme',t);\n      btn.innerHTML = t==='dark' ? sun : moon;\n      var m=document.querySelector('meta[name=theme-color]'); if(m) m.setAttribute('content', t==='dark'?'#1F1F1F':'#FBFBFB');\n    }\n    var saved;\n    try{ saved=localStorage.getItem('lingo-theme'); }catch(e){}\n    if(!saved) saved = (window.matchMedia && matchMedia('(prefers-color-scheme: dark)').matches) ? 'dark':'light';\n    apply(saved);\n    btn.addEventListener('click',function(){\n      var next = root.getAttribute('data-theme')==='dark'?'light':'dark';\n      apply(next);\n      try{ localStorage.setItem('lingo-theme',next); }catch(e){}\n    });\n  })();\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
